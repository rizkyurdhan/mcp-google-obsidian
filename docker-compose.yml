services:
  mcp-server:
    build: .
    env_file:
      - .env
    ports:
      - "3005:3000" # Internal plumbing port for Docker
    environment:
      - MCP_TRANSPORT=http
      - MCP_HTTP_PORT=3000
      - OBSIDIAN_REST_API_URL=https://obsidian:27124
      - OBSIDIAN_REST_API_KEY=replace_this_with_key_from_plugin
      - OBSIDIAN_VAULT_PATH=/vault # Kept as a fallback
      - GOOGLE_REDIRECT_URI=http://srv1757576.tailf459bb.ts.net:3005/callback
    volumes:
      - /opt/docker/obsidian-vault/Bismillahirrohmanirrahim:/vault
      - ./tokens.json:/app/tokens.json
    restart: unless-stopped
    depends_on:
      - obsidian

  obsidian:
    image: lscr.io/linuxserver/obsidian:latest
    container_name: obsidian
    security_opt:
      - seccomp:unconfined # Required for Chrome/Electron inside container
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - DOCKER_MODS=linuxserver/mods:universal-kasmvnc-http
      - CUSTOM_RES_W=1280
      - CUSTOM_RES_H=720
      - APP_ARGS=--disable-gpu --disable-software-rasterizer --disable-dev-shm-usage --no-sandbox
    volumes:
      - ./obsidian-config:/config # Stores Obsidian app settings/plugins
      - /opt/docker/obsidian-vault:/vault # Your actual markdown files
    ports:
      - "3001:3000" # Access Obsidian Web GUI at http://localhost:3001
    restart: unless-stopped